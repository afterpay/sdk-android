name: Publish specific staging repo on Maven Central

on:
  push:
    branches: [ temp/release-staging ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: '11'

      - name: Publish release to the Maven Central Repository
        run: ./gradlew closeAndReleaseRepository --repository comafterpay-1054 --stacktrace --debug
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
